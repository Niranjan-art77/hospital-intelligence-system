services:
  # ── Java Spring Boot Backend API (Docker) ──
  - type: web
    name: hospital-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8080"

  # ── React Frontend (Static Site) ──
  - type: web
    name: hospital-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        value: "https://hospital-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
