services:
  # ── Java Spring Boot Backend API ──
  - type: web
    name: hospital-backend
    runtime: java
    plan: free
    region: singapore
    javaVersion: "17"
    buildCommand: "chmod +x mvnw && ./mvnw clean package -DskipTests"
    startCommand: "java -Dserver.port=$PORT -jar target/hospital-intelligence-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: PORT
        value: "8080"

  # ── React Frontend (Static Site) ──
  - type: web
    name: hospital-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        value: "https://hospital-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
